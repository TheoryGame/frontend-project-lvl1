name: check-ESlint
  
on:
- push
    
jobs:
    build:
        runs-on: ubuntu-latest        
steps:
 - uses: actions/checkout@v2
 - name: Run Linter
   run: |
     make lint
 - name: Hexlet project check
        uses: hexlet/project-action@release
        with:
          hexlet-id: ${{ secrets.HEXLET_ID }}
